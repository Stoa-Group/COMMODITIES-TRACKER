# Publish to Domo when code is pushed to master/main
name: Publish to Domo

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Domo CLI (ryuu)
        run: |
          npm cache clean --force
          npm install -g ryuu --prefer-online --no-audit --no-fund || \
          npm install -g ryuu --registry https://registry.npmmirror.com --prefer-online --no-audit --no-fund

      - name: Fix ryuu inquirer dependency
        run: cd $(npm root -g)/ryuu && npm install inquirer --save || true

      - name: Validate Domo credentials
        env:
          DOMO_INSTANCE: ${{ secrets.DOMO_INSTANCE }}
          DOMO_TOKEN: ${{ secrets.DOMO_TOKEN }}
        run: |
          if [ -z "$DOMO_INSTANCE" ]; then
            echo "Missing DOMO_INSTANCE secret (example: company.domo.com)."
            exit 1
          fi
          if [ -z "$DOMO_TOKEN" ]; then
            echo "Missing DOMO_TOKEN secret. Use a Domo Developer Token from Admin > Authentication."
            exit 1
          fi
          # Normalize shorthand instance values to a valid hostname for non-interactive CLI login.
          if [[ "$DOMO_INSTANCE" != *.* ]]; then
            DOMO_INSTANCE="${DOMO_INSTANCE}.domo.com"
          fi
          echo "DOMO_INSTANCE=$DOMO_INSTANCE" >> "$GITHUB_ENV"

      - name: Login to Domo
        env:
          DOMO_INSTANCE: ${{ env.DOMO_INSTANCE }}
          DOMO_TOKEN: ${{ secrets.DOMO_TOKEN }}
        run: domo login --token-only -i "$DOMO_INSTANCE" -t "$DOMO_TOKEN"

      - name: Publish to Domo
        run: domo -m manifest.json publish
