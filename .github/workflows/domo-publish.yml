# Publish to Domo when code is pushed to master/main
name: Publish to Domo

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Domo CLI (ryuu)
        run: |
          npm cache clean --force
          npm install -g ryuu --prefer-online --no-audit --no-fund || \
          npm install -g ryuu --registry https://registry.npmmirror.com --prefer-online --no-audit --no-fund

      - name: Fix ryuu inquirer dependency
        run: cd $(npm root -g)/ryuu && npm install inquirer --save || true

      - name: Validate Domo credentials
        env:
          DOMO_INSTANCE: ${{ secrets.DOMO_INSTANCE }}
          DOMO_HOST: ${{ secrets.DOMO_HOST }}
          DOMO_DOMAIN: ${{ secrets.DOMO_DOMAIN }}
          DOMO_TOKEN: ${{ secrets.DOMO_TOKEN }}
          DOMO_DEV_TOKEN: ${{ secrets.DOMO_DEV_TOKEN }}
          DOMO_DEVELOPER_TOKEN: ${{ secrets.DOMO_DEVELOPER_TOKEN }}
          DOMO_ACCESS_TOKEN: ${{ secrets.DOMO_ACCESS_TOKEN }}
        run: |
          INSTANCE="${DOMO_INSTANCE:-${DOMO_HOST:-${DOMO_DOMAIN:-}}}"
          TOKEN="${DOMO_TOKEN:-${DOMO_DEV_TOKEN:-${DOMO_DEVELOPER_TOKEN:-${DOMO_ACCESS_TOKEN:-}}}}"

          if [ -z "$INSTANCE" ]; then
            echo "Missing Domo instance secret. Set one of: DOMO_INSTANCE, DOMO_HOST, DOMO_DOMAIN."
            exit 1
          fi
          if [ -z "$TOKEN" ]; then
            echo "Missing Domo token secret. Set one of: DOMO_TOKEN, DOMO_DEV_TOKEN, DOMO_DEVELOPER_TOKEN, DOMO_ACCESS_TOKEN."
            echo "Use a Domo Developer Token from Admin > Authentication."
            exit 1
          fi

          # Normalize shorthand instance values to a valid hostname for non-interactive CLI login.
          if [[ "$INSTANCE" != *.* ]]; then
            INSTANCE="${INSTANCE}.domo.com"
          fi
          echo "DOMO_INSTANCE=$INSTANCE" >> "$GITHUB_ENV"
          echo "DOMO_TOKEN=$TOKEN" >> "$GITHUB_ENV"

      - name: Login to Domo
        env:
          DOMO_INSTANCE: ${{ env.DOMO_INSTANCE }}
          DOMO_TOKEN: ${{ env.DOMO_TOKEN }}
        run: domo login --token-only -i "$DOMO_INSTANCE" -t "$DOMO_TOKEN"

      - name: Publish to Domo
        run: domo -m manifest.json publish
