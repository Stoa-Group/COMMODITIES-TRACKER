name: Nightly Commodities Tracker

on:
  schedule:
    # Run daily at 2:00 AM UTC (adjust timezone as needed)
    - cron: '0 2 * * *'
  workflow_dispatch:  # Allow manual triggering

jobs:
  track-commodities:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
    
    - name: Run commodities tracker
      env:
        # Free sources only - no paid APIs
        # Required secrets: FRED_API_KEY, STOAGROUP_API_URL, COMMODITIES_INGEST_KEY
        FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        STOAGROUP_API_URL: ${{ secrets.STOAGROUP_API_URL }}
        COMMODITIES_INGEST_KEY: ${{ secrets.COMMODITIES_INGEST_KEY }}
      run: |
        python commodities_tracker.py

